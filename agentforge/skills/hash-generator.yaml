name: hash-generator
version: "1.1.0"
description: "Generate MD5, SHA1, SHA256 hashes for text or files"
description_zh: "生成文本或文件的 MD5、SHA1、SHA256 哈希值"
author: skillsnap
category: security
triggers: ["hash", "md5", "sha256", "checksum"]
triggers_zh: ["哈希", "校验", "摘要"]
tags: [security, crypto, utility]
steps:
  - tool: log
    params: {message: "🔐 Generating hash...", level: info}
  - tool: shell
    params:
      command: |
        INPUT="{{ input | regex_search('(?:hash|md5|sha256|checksum)\\s*(.*)', '\\1') }}"
        FILE=$(echo "$INPUT" | grep -oE '[^ ]+\.[^ ]+' | head -1)
        if [ -f "$FILE" ]; then
          echo "File: $FILE"
          echo "MD5:    $(md5sum "$FILE" 2>/dev/null || md5 -q "$FILE")"
          echo "SHA1:   $(sha1sum "$FILE" 2>/dev/null || shasum -a 1 "$FILE")"
          echo "SHA256: $(sha256sum "$FILE" 2>/dev/null || shasum -a 256 "$FILE")"
        else
          TEXT="${INPUT:-hello}"
          echo "Text: $TEXT"
          echo "MD5:    $(echo -n "$TEXT" | md5sum 2>/dev/null || echo -n "$TEXT" | md5)"
          echo "SHA1:   $(echo -n "$TEXT" | sha1sum 2>/dev/null || echo -n "$TEXT" | shasum -a 1)"
          echo "SHA256: $(echo -n "$TEXT" | sha256sum 2>/dev/null || echo -n "$TEXT" | shasum -a 256)"
        fi
      timeout: 10
    output: hashes
  - tool: output
    params: {message: "{{ hashes.stdout }}", format: panel, title: "Hash Results"}
