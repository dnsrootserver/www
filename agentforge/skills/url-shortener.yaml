name: url-shortener
version: "1.1.0"
description: "Shorten URLs using free services"
description_zh: "使用免费服务缩短 URL"
author: agentforge
category: web
triggers: ["shorten url", "short url", "shorten link"]
triggers_zh: ["短链接", "缩短链接", "短网址"]
tags: [web, utility]
steps:
  - tool: regex_extract
    params: {text: "{{ input }}", pattern: "https?://\\S+", var: urls}
  - tool: http
    params:
      url: "https://is.gd/create.php?format=simple&url={{ urls[0] }}"
      method: GET
      timeout: 10
    output: short
  - tool: output
    params:
      message: "🔗 Original: {{ urls[0] }}\n📎 Short: {{ short.body }}"
      format: panel
      title: "URL Shortener"
