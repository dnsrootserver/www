name: password-gen
version: "1.1.0"
description: "Generate secure random passwords"
description_zh: "生成安全随机密码"
author: agentbolt
category: security
triggers: ["generate password", "password gen", "create password", "random password"]
triggers_zh: ["生成密码", "密码生成", "随机密码"]
tags: [security, utility]
steps:
  - tool: regex_extract
    params: {text: "{{ input }}", pattern: "\\b(\\d{1,3})\\b", var: length}
  - tool: transform
    params:
      expr: "int(length[0]) if length else 16"
      var: pwd_length
  - tool: shell
    params:
      command: |
        python3 -c "
import secrets, string
length = {{ pwd_length }}
alphabet = string.ascii_letters + string.digits + string.punctuation
password = ''.join(secrets.choice(alphabet) for _ in range(length))
print(password)
"
      timeout: 5
    output: password
  - tool: output
    params:
      message: |
        Generated Password ({{ pwd_length }} characters):
        {{ password.stdout }}
      format: panel
      title: "Password Generator"