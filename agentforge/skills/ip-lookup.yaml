name: ip-lookup
version: "1.1.0"
description: "Look up IP address information using ip-api.com"
description_zh: "使用 ip-api.com 查询 IP 地址信息"
author: agentforge
category: network
triggers: ["ip lookup", "whois ip", "ip info", "ip address info"]
triggers_zh: ["IP 查询", "IP 地址查询", "IP 信息"]
tags: [network, utility]
steps:
  - tool: regex_extract
    params: {text: "{{ input }}", pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b", var: ip_address}
  - tool: http
    params:
      url: "http://ip-api.com/json/{{ ip_address[0] }}"
      method: GET
      timeout: 10
    output: ip_info
  - tool: output
    params:
      message: |
        IP Address: {{ ip_address[0] }}
        Country: {{ ip_info.body.country }}
        Region: {{ ip_info.body.regionName }}
        City: {{ ip_info.body.city }}
        ISP: {{ ip_info.body.isp }}
        Org: {{ ip_info.body.org }}
        Lat/Lon: {{ ip_info.body.lat }}, {{ ip_info.body.lon }}
        Timezone: {{ ip_info.body.timezone }}
        Query Status: {{ ip_info.body.status }}
      format: panel
      title: "IP Lookup Results"