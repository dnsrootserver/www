name: ping-test
version: "1.1.0"
description: "Ping a host to test connectivity"
description_zh: "Ping 主机测试连通性"
author: skillsnap
category: network
triggers: ["ping", "ping test", "test connection", "host ping"]
triggers_zh: ["Ping", "测试连接", "网络测试"]
tags: [network, diagnostic]
steps:
  - tool: regex_extract
    params: {text: "{{ input }}", pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b|\\b(?:[a-zA-Z0-9-]+\\.)+[a-zA-Z]{2,}\\b", var: host}
  - tool: shell
    params:
      command: "ping -c 4 {{ host[0] }}"
      timeout: 15
    output: ping_output
  - tool: shell
    params:
      command: "ping -c 4 {{ host[0] }} | tail -2"
      timeout: 5
    output: ping_summary
  - tool: output
    params:
      message: |
        Host: {{ host[0] }}
        Ping Output:
        {{ ping_output.stdout }}
        Summary:
        {{ ping_summary.stdout }}
      format: panel
      title: "Ping Test Results"