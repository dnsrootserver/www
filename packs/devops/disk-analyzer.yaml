version: 1.1.0
premium: true
name: Disk Analyzer
description:
  en: Analyze disk usage, find large files, identify space hogs, and manage storage.
  zh: 分析磁盘使用情况，查找大文件，识别空间占用大户，并管理存储。
triggers:
  en:
    - "disk analyzer"
    - "disk usage"
    - "disk space"
    - "large files"
    - "storage analysis"
  zh:
    - "磁盘分析器"
    - "磁盘使用"
    - "磁盘空间"
    - "大文件"
    - "存储分析"
tools:
  - name: disk_usage
    description:
      en: Show disk usage for all mounted filesystems
      zh: 显示所有已挂载文件系统的磁盘使用情况
    parameters:
      threshold:
        type: integer
        description:
          en: Alert threshold percentage (default 80)
          zh: 警报阈值百分比（默认80）
        default: 80
      show_inodes:
        type: boolean
        description:
          en: Show inode usage
          zh: 显示inode使用情况
        default: false
    implementation:
      type: shell
      command: |
        echo "=== Disk Usage Analysis ==="
        echo ""
        
        echo "=== Filesystem Usage ==="
        df -h 2>/dev/null | grep -v tmpfs | awk -v thresh={{threshold}} '
          NR==1 {print; next}
          {
            gsub(/%/,"",$5)
            if ($5+0 >= thresh) {
              print $0 " ⚠️  ALERT: " $5 "% used"
            } else {
              print $0
            }
          }'
        
        if [ "{{show_inodes}}" = "true" ]; then
          echo ""
          echo "=== Inode Usage ==="
          df -i 2>/dev/null | grep -v tmpfs | awk -v thresh=90 '
            NR==1 {print; next}
            {
              gsub(/%/,"",$5)
              if ($5+0 >= thresh) {
                print $0 " ⚠️  ALERT: " $5 "% used"
              } else {
                print $0
              }
            }'
        fi
  - name: large_files
    description:
      en: Find largest files and directories
      zh: 查找最大的文件和目录
    parameters:
      path:
        type: string
        description:
          en: Path to analyze
          zh: 要分析的路径
        default: "/"
      depth:
        type: integer
        description:
          en: Directory depth to analyze
          zh: 要分析的目录深度
        default: 2
      top_n:
        type: integer
        description:
          en: Number of top items to show
          zh: 显示的顶部项目数量
        default: 20
    implementation:
      type: shell
      command: |
        echo "=== Large Files Analysis: {{path}} ==="
        echo ""
        
        echo "=== Top {{top_n}} Directories ==="
        du -h --max-depth={{depth}} "{{path}}" 2>/dev/null | sort -rh | head -{{top_n}} || du -sh "{{path}}"/* 2>/dev/null | sort -rh | head -{{top_n}}
        
        echo ""
        echo "=== Top {{top_n}} Large Files ==="
        find "{{path}}" -type f -size +100M -exec ls -lh {} \; 2>/dev/null | sort -k5 -rh | head -{{top_n}} || echo "No files larger than 100MB found"
        
        echo ""
        echo "=== File Type Distribution ==="
        find "{{path}}" -type f 2>/dev/null | sed 's/.*\.//' | sort | uniq -c | sort -rn | head -10
  - name: directory_analysis
    description:
      en: Analyze specific directory contents and usage
      zh: 分析特定目录内容和使用情况
    parameters:
      path:
        type: string
        description:
          en: Directory path to analyze
          zh: 要分析的目录路径
        required: true
      show_hidden:
        type: boolean
        description:
          en: Include hidden files
          zh: 包括隐藏文件
        default: false
    implementation:
      type: shell
      command: |
        echo "=== Directory Analysis: {{path}} ==="
        echo ""
        
        if [ ! -d "{{path}}" ]; then
          echo "❌ Directory not found: {{path}}"
          exit 1
        fi
        
        echo "=== Directory Size ==="
        du -sh "{{path}}" 2>/dev/null
        
        echo ""
        echo "=== Contents Summary ==="
        echo "Files: $(find "{{path}}" -type f 2>/dev/null | wc -l)"
        echo "Directories: $(find "{{path}}" -type d 2>/dev/null | wc -l)"
        
        if [ "{{show_hidden}}" = "true" ]; then
          echo "Hidden files: $(find "{{path}}" -name ".*" -type f 2>/dev/null | wc -l)"
        fi
        
        echo ""
        echo "=== Largest Subdirectories ==="
        du -sh "{{path}}"/* 2>/dev/null | sort -rh | head -10
        
        echo ""
        echo "=== Recent Files ==="
        find "{{path}}" -type f -mtime -7 2>/dev/null | head -10
  - name: cleanup_suggestions
    description:
      en: Suggest cleanup actions based on disk usage
      zh: 根据磁盘使用情况建议清理操作
    parameters:
      path:
        type: string
        description:
          en: Path to analyze
          zh: 要分析的路径
        default: "/"
      aggressive:
        type: boolean
        description:
          en: Include more aggressive cleanup suggestions
          zh: 包括更积极的清理建议
        default: false
    implementation:
      type: shell
      command: |
        echo "=== Disk Cleanup Suggestions: {{path}} ==="
        echo ""
        
        echo "=== Common Cleanup Targets ==="
        
        # Log files
        LOG_SIZE=$(find /var/log -type f -name "*.log" -size +100M 2>/dev/null | wc -l)
        if [ "$LOG_SIZE" -gt 0 ]; then
          echo "⚠️  Large log files (>100MB): $LOG_SIZE files"
          find /var/log -type f -name "*.log" -size +100M 2>/dev/null | head -5
        fi
        
        # Old log files
        OLD_LOGS=$(find /var/log -type f -name "*.gz" -mtime +30 2>/dev/null | wc -l)
        if [ "$OLD_LOGS" -gt 0 ]; then echo "⚠️  Old compressed logs (>30 days): $OLD_LOGS files"
        fi
        
        # Package manager cache
        if [ -d /var/cache/apt ]; then
          APT_SIZE=$(du -sh /var/cache/apt 2>/dev/null | cut -f1)
          echo "⚠️  APT cache size: $APT_SIZE"
        fi
        
        if [ -d /var/cache/yum ]; then
          YUM_SIZE=$(du -sh /var/cache/yum 2>/dev/null | cut -f1)
          echo "⚠️  YUM cache size: $YUM_SIZE"
        fi
        
        # Docker
        if command -v docker &> /dev/null; then
          DOCKER_SIZE=$(docker system df 2>/dev/null | grep "Build Cache" | awk '{print $4}')
          if [ -n "$DOCKER_SIZE" ]; then
            echo "⚠️  Docker build cache: $DOCKER_SIZE"
          fi
        fi
        
        # Temp files
        TEMP_SIZE=$(du -sh /tmp 2>/dev/null | cut -f1)
        echo "⚠️  /tmp size: $TEMP_SIZE"
        
        echo ""
        echo "=== Cleanup Commands ==="
        echo "1. Clean old logs: find /var/log -name '*.gz' -mtime +30 -delete"
        echo "2. Clean package cache: apt clean (or yum clean all)"
        echo "3. Clean Docker: docker system prune -f"
        echo "4. Clean temp: find /tmp -type f -mtime +7 -delete"
        
        if [ "{{aggressive}}" = "true" ]; then
          echo ""
          echo "=== Aggressive Cleanup ==="
          echo "5. Remove old kernels: apt autoremove --purge"
          echo "6. Clean user cache: rm -rf ~/.cache/*"
          echo "7. Remove old snapshots: lvs --sort=-lv_time | tail -n +2"
        fi
  - name: disk_health
    description:
      en: Check disk health and SMART status
      zh: 检查磁盘健康和SMART状态
    parameters:
      device:
        type: string
        description:
          en: Disk device (e.g., /dev/sda)
          zh: 磁盘设备（例如/dev/sda）
        default: null
    implementation:
      type: shell
      command: |
        echo "=== Disk Health Check ==="
        echo ""
        
        if [ -n "{{device}}" ] && [ "{{device}}" != "null" ]; then
          echo "=== Device: {{device}} ==="
          if command -v smartctl &> /dev/null; then
            smartctl -H "{{device}}" 2>/dev/null || echo "SMART not available for {{device}}"
          else
            echo "smartctl not installed. Install with: apt install smartmontools"
          fi
        else
          echo "=== All Disks ==="
          lsblk -o NAME,SIZE,TYPE,MOUNTPOINT 2>/dev/null || fdisk -l 2>/dev/null | grep "Disk /dev"
          
          echo ""
          echo "=== Disk I/O Stats ==="
          iostat -x 1 1 2>/dev/null || echo "iostat not available"
        fi
        
        echo ""
        echo "=== RAID Status (if applicable) ==="
        if [ -f /proc/mdstat ]; then
          cat /proc/mdstat
        else
          echo "No software RAID detected"
        fi