version: 1.1.0
premium: true
name: Data Validator
description:
  en: Validate data quality, schema compliance, and business rules. Generate validation reports.
  zh: 验证数据质量、模式合规性和业务规则。生成验证报告。
tools:
  - name: validate_csv
    description:
      en: Validate CSV file against rules
      zh: 根据规则验证CSV文件
    parameters:
      file_path:
        type: string
        description:
          en: Path to CSV file
          zh: CSV文件路径
        required: true
      rules:
        type: object
        description:
          en: Validation rules (column_name: rule_object)
          zh: 验证规则（列名: 规则对象）
        default: null
      output_format:
        type: string
        enum: [text, json, html]
        description:
          en: Report format
          zh: 报告格式
        default: text
    implementation:
      type: shell
      command: |
        if [ ! -f "{{file_path}}" ]; then
          echo "Error: File not found: {{file_path}}"
          exit 1
        fi
        python3 << 'EOF'
        import csv
        import json
        import re
        import sys
        from datetime import datetime
        file_path = "{{file_path}}"
        rules_json = """{{rules}}"""
        # Default validation
        errors = []
        warnings = []
        with open(file_path) as f:
            reader = csv.DictReader(f)
            rows = list(reader)
            headers = reader.fieldnames
        # Basic validations
        if not rows:
            errors.append("File is empty (no data rows)")
        # Check for duplicate rows
        seen = set()
        dupes = 0
        for i, row in enumerate(rows, 2):
            row_str = str(sorted(row.items()))
            if row_str in seen:
                dupes += 1
            seen.add(row_str)
        if dupes:
            warnings.append(f"{dupes} duplicate rows found")
        # Check for empty values
        for col in headers:
            empty = sum(1 for row in rows if not row.get(col, '').strip())
            if empty:
                warnings.append(f"Column '{col}': {empty} empty values ({empty/len(rows)*100:.1f}%)")
        # Apply custom rules if provided
        if rules_json and rules_json != "null":
            try:
                rules = json.loads(rules_json)
                for col, rule in rules.items():
                    if col not in headers:
                        errors.append(f"Column '{col}' not found in CSV")
                        continue
                    for i, row in enumerate(rows, 2):
                        val = row.get(col, '')
                        if rule.get('required') and not val.strip():
                            errors.append(f"Row {i}: Column '{col}' is required but empty")
                        if 'type' in rule:
                            if rule['type'] == 'number':
                                try:
                                    float(val)
                                except ValueError:
                                    errors.append(f"Row {i}: Column '{col}' value '{val}' is not a number")
                            elif rule['type'] == 'email':
                                if not re.match(r'^[^@]+@[^@]+\.[^@]+$', val):
                                    errors.append(f"Row {i}: Column '{col}' value '{val}' is not a valid email")
                        if 'min' in rule and float(val) < rule['min']:
                            errors.append(f"Row {i}: Column '{col}' value {val} < minimum {rule['min']}")
                        if 'max' in rule and float(val) > rule['max']:
                            errors.append(f"Row {i}: Column '{col}' value {val} > maximum {rule['max']}")
            except json.JSONDecodeError:
                errors.append("Invalid rules JSON")
        # Generate report
        if "{{output_format}}" == "json":
            report = {
                "file": file_path,
                "total_rows": len(rows),
                "total_columns": len(headers),
                "errors": errors,
                "warnings": warnings,
                "passed": len(errors) == 0
            }
            print(json.dumps(report, indent=2))
        else:
            print(f"=== Data Validation Report ===")
            print(f"File: {file_path}")
            print(f"Rows: {len(rows)}, Columns: {len(headers)}")
            print(f"\nErrors: {len(errors)}")
            for e in errors:
                print(f"  [ERROR] {e}")
            print(f"\nWarnings: {len(warnings)}")
            for w in warnings:
                print(f"  [WARNING] {w}")
            print(f"\nResult: {'PASSED' if not errors else 'FAILED'}")
        EOF
  - name: validate_schema
    description:
      en: Validate JSON data against JSON Schema
      zh: 根据JSON Schema验证JSON数据
    parameters:
      data_file:
        type: string
        description:
          en: Path to JSON data file
          zh: JSON数据文件路径
        required: true
      schema_file:
        type: string
        description:
          en: Path to JSON Schema file
          zh: JSON模式文件路径
        required: true
    implementation:
      type: shell
      command: |
        python3 << EOF
        import json
        import sys
        try:
            import jsonschema
        except ImportError:
            print("Error: jsonschema package required. Install with: pip install jsonschema")
            sys.exit(1)
        with open("{{data_file}}") as f:
            data = json.load(f)
        with open("{{schema_file}}") as f:
            schema = json.load(f)
        try:
            jsonschema.validate(data, schema)
            print("VALID: Data matches schema")
        except jsonschema.ValidationError as e:
            print(f"INVALID: {e.message}")
            print(f"Path: {'.'.join(str(p) for p in e.absolute_path)}")
        EOF