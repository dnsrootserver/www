version: 1.1.0
premium: true
name: LinkedIn Post
description:
  en: Create and manage LinkedIn posts, analyze engagement, and schedule content.
  zh: 创建和管理LinkedIn帖子，分析互动，安排内容发布。
tools:
  - name: create_post
    description:
      en: Create a LinkedIn post with text, images, or articles
      zh: 创建带有文本、图片或文章的LinkedIn帖子
    parameters:
      content:
        type: string
        description:
          en: Post content/text
          zh: 帖子内容/文本
        required: true
      visibility:
        type: string
        enum: [public, connections, logged_in]
        description:
          en: Post visibility
          zh: 帖子可见性
        default: public
      media_url:
        type: string
        description:
          en: URL of image or video to attach
          zh: 要附加的图片或视频URL
        default: null
      article_url:
        type: string
        description:
          en: URL of article to share
          zh: 要分享的文章URL
        default: null
      hashtags:
        type: array
        items:
          type: string
        description:
          en: List of hashtags (without #)
          zh: 话题标签列表（不带#）
        default: []
    implementation:
      type: shell
      command: |
        echo "LinkedIn Post Creator"
        echo "===================="
        echo ""
        echo "Content:"
        echo "{{content}}"
        echo ""
        
        if [ "{{visibility}}" = "public" ]; then
          echo "Visibility: Public (anyone on LinkedIn)"
        elif [ "{{visibility}}" = "connections" ]; then
          echo "Visibility: Connections only"
        else
          echo "Visibility: LinkedIn members only"
        fi
        
        if [ -n "{{media_url}}" ] && [ "{{media_url}}" != "null" ]; then
          echo "Media: {{media_url}}"
        fi
        
        if [ -n "{{article_url}}" ] && [ "{{article_url}}" != "null" ]; then
          echo "Article: {{article_url}}"
        fi
        
        if [ {{#hashtags}} -gt 0 ]; then
          echo "Hashtags: {{hashtags}}"
        fi
        
        echo ""
        echo "Note: LinkedIn API requires OAuth 2.0 authentication."
        echo "To actually post, you need to:"
        echo "1. Create a LinkedIn app at https://www.linkedin.com/developers/"
        echo "2. Get access token with w_member_social permission"
        echo "3. Use the LinkedIn API directly or integrate with AgentForge"
        
        # Example of how to post via API (commented out)
        # curl -X POST "https://api.linkedin.com/v2/ugcPosts" \
        #   -H "Authorization: Bearer $LINKEDIN_ACCESS_TOKEN" \
        #   -H "Content-Type: application/json" \
        #   -d '{
        #     "author": "urn:li:person:YOUR_PERSON_ID",
        #     "lifecycleState": "PUBLISHED",
        #     "specificContent": {
        #       "com.linkedin.ugc.ShareContent": {
        #         "shareCommentary": {
        #           "text": "{{content}}"
        #         },
        #         "shareMediaCategory": "NONE"
        #       }
        #     },
        #     "visibility": {
        #       "com.linkedin.ugc.MemberNetworkVisibility": "{{visibility}}"
        #     }
        #   }'

  - name: analyze_engagement
    description:
      en: Analyze engagement metrics for a LinkedIn post
      zh: 分析LinkedIn帖子的互动指标
    parameters:
      post_url:
        type: string
        description:
          en: LinkedIn post URL
          zh: LinkedIn帖子URL
        required: true
    implementation:
      type: shell
      command: |
        echo "LinkedIn Engagement Analyzer"
        echo "==========================="
        echo ""
        echo "Post URL: {{post_url}}"
        echo ""
        echo "Note: LinkedIn API requires authentication to get engagement metrics."
        echo "To analyze engagement, you need:"
        echo "1. LinkedIn API access with r_organization_social permission"
        echo "2. The post must be from your organization or you need proper permissions"
        echo ""
        echo "Available metrics would include:"
        echo "- Likes/reactions count"
        echo "- Comments count"
        echo "- Shares count"
        echo "- Click-through rate"
        echo "- Impressions"
        echo "- Engagement rate"
        
        # Example API call (commented out)
        # curl -X GET "https://api.linkedin.com/v2/socialActions/urn:li:share:POST_ID" \
        #   -H "Authorization: Bearer $LINKEDIN_ACCESS_TOKEN"

  - name: generate_post_ideas
    description:
      en: Generate LinkedIn post ideas based on topic or industry
      zh: 根据主题或行业生成LinkedIn帖子创意
    parameters:
      topic:
        type: string
        description:
          en: Topic or industry
          zh: 主题或行业
        required: true
      post_type:
        type: string
        enum: [professional, thought_leadership, company_update, industry_news, tips, questions]
        description:
          en: Type of post
          zh: 帖子类型
        default: professional
      tone:
        type: string
        enum: [formal, casual, enthusiastic, informative]
        description:
          en: Tone of the post
          zh: 帖子语气
        default: professional
    implementation:
      type: shell
      command: |
        echo "LinkedIn Post Ideas for: {{topic}}"
        echo "Type: {{post_type}}"
        echo "Tone: {{tone}}"
        echo ""
        
        case "{{post_type}}" in
          "professional")
            echo "1. Share a recent achievement or milestone related to {{topic}}"
            echo "2. Highlight a team member's contribution in {{topic}}"
            echo "3. Share industry insights or trends in {{topic}}"
            echo "4. Post about a recent conference or event related to {{topic}}"
            echo "5. Share a case study or success story in {{topic}}"
            ;;
          "thought_leadership")
            echo "1. Share your perspective on the future of {{topic}}"
            echo "2. Discuss challenges and solutions in {{topic}}"
            echo "3. Share lessons learned from your experience in {{topic}}"
            echo "4. Analyze recent trends or changes in {{topic}}"
            echo "5. Offer predictions for {{topic}} in the coming year"
            ;;
          "company_update")
            echo "1. Announce a new product or service related to {{topic}}"
            echo "2. Share company achievements or awards in {{topic}}"
            echo "3. Introduce new team members specializing in {{topic}}"
            echo "4. Share behind-the-scenes of {{topic}} projects"
            echo "5. Announce partnerships or collaborations in {{topic}}"
            ;;
          "industry_news")
            echo "1. Comment on recent news or developments in {{topic}}"
            echo "2. Share analysis of industry reports about {{topic}}"
            echo "3. Discuss regulatory changes affecting {{topic}}"
            echo "4. Share market trends or statistics about {{topic}}"
            echo "5. Interview an expert in {{topic}}"
            ;;
          "tips")
            echo "1. Share 5 tips for success in {{topic}}"
            echo "2. Common mistakes to avoid in {{topic}}"
            echo "3. Best practices for {{topic}} professionals"
            echo "4. Tools and resources for {{topic}}"
            echo "5. How to get started in {{topic}}"
            ;;
          "questions")
            echo "1. Ask about challenges in {{topic}}"
            echo "2. Request recommendations for {{topic}} resources"
            echo "3. Ask for opinions on {{topic}} trends"
            echo "4. Poll about {{topic}} preferences"
            echo "5. Ask for advice on {{topic}} career growth"
            ;;
        esac
        
        echo ""
        echo "Posting Tips:"
        echo "- Use relevant hashtags: #{{topic}} #LinkedInTips #ProfessionalDevelopment"
        echo "- Include a call-to-action (like, comment, share)"
        echo "- Add a personal touch or story"
        echo "- Keep it concise (1-3 paragraphs)"
        echo "- Use emojis strategically"